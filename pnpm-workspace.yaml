packages:
  - 'apps/*'
  - 'packages/*'

# pnpm 10+ may block postinstall scripts by default.
# These deps need their build scripts enabled (Prisma engines, esbuild, etc.).
onlyBuiltDependencies:
  - '@clerk/shared'
  - '@prisma/client'
  - '@prisma/engines'
  - 'esbuild'
  - 'msgpackr-extract'
  - 'prisma'
